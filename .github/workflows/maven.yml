name: Plugin Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Debug - Java version
        run: |
          java -version
          echo "JAVA_HOME: $JAVA_HOME"

      - name: Install Utility module
        run: mvn clean install -DskipTests -pl Utility

      - name: Build with Maven
        run: mvn package -DskipTests -pl 26_R1,Plugin -am

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TamableFoxes-v${{ github.run_id }}
          path: Plugin/target/TamableFoxes-*.jar
          if-no-files-found: warn
          retention-days: 30
